services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mount-optimizer-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true

volumes:
  node_modules:
